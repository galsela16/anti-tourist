<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Tourist | טיול בלי ההמונים</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center p-6">

    <header class="text-center mt-10 mb-10">
        <h1 class="text-4xl font-bold text-gray-800 mb-2">Anti<span class="text-emerald-600">-Tourist</span></h1>
        <p class="text-gray-600">גלה את הסודות המקומיים. תברח מההמונים בזמן אמת.</p>
    </header>

    <main class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">
        <!-- תיבת הגדרת מפתח ה-API - מוגנת מפני הבוטים של GitHub -->
        <div class="mb-4 bg-gray-100 p-3 rounded-xl border border-gray-200">
            <label class="block text-gray-700 text-xs font-bold mb-1">מפתח Gemini API (מ-Google AI Studio):</label>
            <input id="apiKey" type="password" placeholder="הדבק כאן את ה-AIzaSy שלך..." class="w-full px-3 py-2 text-xs rounded-lg border border-gray-300 focus:outline-none focus:border-emerald-500 text-left">
            <p class="text-[10px] text-gray-500 mt-1">* המפתח נשמר בדפדפן שלך בלבד ולא ייחשף ב-GitHub.</p>
        </div>

        <hr class="mb-4 border-gray-200">

        <div class="mb-6">
          <label class="block text-gray-700 text-sm font-bold mb-2">לאן כולם הולכים? (הכנס כל מקום בעולם)</label>
          <input id="search" type="text" placeholder="לדוגמה: מזרקת טרווי, אייפל, הכותל..." class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-emerald-500 transition text-right">
        </div>
        
        <button onclick="handleSearch()" id="btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-md flex justify-center items-center gap-2">
            <span>מצא לי חלופה שקטה</span>
        </button>

        <p id="errorBox" class="mt-4 text-sm text-red-500 font-bold text-center hidden break-words bg-red-50 p-3 rounded-lg border border-red-200"></p>

        <div id="resultBox" class="mt-8 border-t border-gray-100 pt-6 hidden">
            <p class="text-sm text-red-500 font-bold mb-1">⚠️ עמוס שם עכשיו!</p>
            <p class="text-gray-600 mb-4 text-sm">במקום להצטופף ב-<strong id="trapName"></strong>, מערכת ה-AI ממליצה על:</p>
            <div class="bg-emerald-50 border border-emerald-100 rounded-xl p-4">
                <h3 id="altName" class="font-bold text-emerald-800 text-lg mb-1"></h3>
                <p id="altDesc" class="text-sm text-emerald-700 mb-3 leading-relaxed"></p>
                <span class="text-sm text-blue-600 font-bold">📍 המקום מוכן לביקור חלופי!</span>
            </div>
        </div>
    </main>

    <script>
        // טעינה אוטומטית של המפתח מהזיכרון המקומי אם הוא קיים
        window.onload = function() {
            const savedKey = localStorage.getItem('anti_tourist_gemini_key');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
            }
        };

        async function handleSearch() {
            const query = document.getElementById('search').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const errorBox = document.getElementById('errorBox');
            const resultBox = document.getElementById('resultBox');
            const btn = document.getElementById('btn');
            
            if (!query) return;

            if (!apiKey) {
                errorBox.innerText = 'אנא הדבק את מפתח ה-API שלך בתיבה האפורה למעלה.';
                errorBox.classList.remove('hidden');
                return;
            }
            
            // שמירת המפתח בזיכרון הדפדפן לפעמים הבאות
            localStorage.setItem('anti_tourist_gemini_key', apiKey);

            errorBox.classList.add('hidden');
            resultBox.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = '<span>ה-AI מחשב חלופה שקטה...</span>';

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

                const prompt = `You are an expert travel assistant for the app "Anti-Tourist". The user will give you a famous tourist trap/destination. You must find a less crowded, beautiful, hidden gem alternative nearby or in the same city.
                User input: "${query}"
                
                Respond ONLY with a valid JSON object matching this structure (no markdown blocks, no formatting outside the JSON, response must be in Hebrew except for names if appropriate):
                {
                  "tourist_trap": "${query.replace(/"/g, '\\"')}",
                  "alternative_name": "Name of the quiet alternative",
                  "alternative_desc": "1-2 short sentences in Hebrew explaining why it's better, hidden, and beautiful"
                }`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`שגיאת שרת גוגל (${response.status}). ודא שהעתקת את המפתח שלך נכון מ-AI Studio.`);
                }

                const data = await response.json();
                let cleanText = data.candidates[0].content.parts[0].text.trim();
                
                if (cleanText.startsWith("```json")) {
                    cleanText = cleanText.substring(7, cleanText.length - 3).trim();
                } else if (cleanText.startsWith("```")) {
                    cleanText = cleanText.substring(3, cleanText.length - 3).trim();
                }

                const result = JSON.parse(cleanText);

                document.getElementById('trapName').innerText = result.tourist_trap;
                document.getElementById('altName').innerText = result.alternative_name;
                document.getElementById('altDesc').innerText = result.alternative_desc;
                resultBox.classList.remove('hidden');
            } catch (err) {
                errorBox.innerText = `אירעה שגיאה: ${err.message}`;
                errorBox.classList.remove('hidden');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>מצא לי חלופה שקטה</span>';
            }
        }
    </script>
</body>
</html>
