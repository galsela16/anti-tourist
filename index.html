<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Tourist | טיול בלי ההמונים</title>
    <!-- חיבור האתר לתעודת הזהות של האפליקציה עבור החנויות -->
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center p-6">

    <header class="text-center mt-10 mb-10">
        <h1 class="text-4xl font-bold text-gray-800 mb-2">Anti<span class="text-emerald-600">-Tourist</span></h1>
        <p class="text-gray-600">גלה את הסודות המקומיים. תברח מההמונים בזמן אמת.</p>
    </header>

    <main class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">
        <div class="mb-6">
          <label class="block text-gray-700 text-sm font-bold mb-2">לאן כולם הולכים? (הכנס כל מקום בעולם)</label>
          <input id="search" type="text" placeholder="לדוגמה: מזרקת טרווי, אייפל, הכותל..." class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-emerald-500 transition text-right">
        </div>
        
        <!-- שני כפתורים אחד ליד השני במבנה גמיש -->
        <div class="flex gap-3 mb-6">
            <button onclick="handleSearch('check')" id="btnCheck" class="w-1/2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-2 rounded-lg transition shadow-md text-sm flex justify-center items-center gap-1">
                <span>בדיקת עומס</span>
            </button>
            <button onclick="handleSearch('alt')" id="btnAlt" class="w-1/2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-2 rounded-lg transition shadow-md text-sm flex justify-center items-center gap-1">
                <span>מצא לי חלופה</span>
            </button>
        </div>

        <p id="errorBox" class="mt-4 text-sm text-red-500 font-bold text-center hidden break-words bg-red-50 p-3 rounded-lg border border-red-200"></p>

        <!-- קופסת התוצאות הדינמית -->
        <div id="resultBox" class="mt-8 border-t border-gray-100 pt-6 hidden">
            <!-- חלק 1: בדיקת העומס -->
            <div id="statusSection" class="hidden">
                <p id="statusTitle" class="text-lg font-bold mb-1"></p>
                <p class="text-gray-600 mb-4 text-sm"><span id="statusDesc"></span> <strong id="trapName"></strong>:</p>
            </div>
            
            <!-- חלק 2: כרטיס החלופה השקטה -->
            <div id="altCard" class="rounded-xl p-4 border hidden">
                <h3 id="altName" class="font-bold text-lg mb-1"></h3>
                <p id="altDesc" class="text-sm mb-3 leading-relaxed"></p>
                <span id="altTag" class="text-sm font-bold"></span>
            </div>
        </div>
    </main>

    <script>
        async function handleSearch(type) {
            const query = document.getElementById('search').value.trim();
            const errorBox = document.getElementById('errorBox');
            const resultBox = document.getElementById('resultBox');
            const btnCheck = document.getElementById('btnCheck');
            const btnAlt = document.getElementById('btnAlt');
            
            if (!query) return;

            errorBox.classList.add('hidden');
            resultBox.classList.add('hidden');
            
            // חסימת שני הכפתורים בזמן הטעינה למניעת לחיצות כפולות
            btnCheck.disabled = true;
            btnAlt.disabled = true;
            
            if (type === 'check') {
                btnCheck.innerHTML = '<span>בודק...</span>';
            } else {
                btnAlt.innerHTML = '<span>מחפש...</span>';
            }

            try {
                const response = await fetch('/api/get-alternative', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });

                if (!response.ok) throw new Error('אירעה שגיאה בקבלת הנתונים מהשרת.');

                const result = await response.json();
                if (result.error) throw new Error(result.error);

                // עדכון כל השדות בנתונים מה-AI
                document.getElementById('statusTitle').innerText = result.status_title;
                document.getElementById('statusDesc').innerText = result.status_desc;
                document.getElementById('trapName').innerText = result.tourist_trap;
                document.getElementById('altName').innerText = result.alternative_name;
                document.getElementById('altDesc').innerText = result.alternative_desc;

                const statusTitle = document.getElementById('statusTitle');
                const altCard = document.getElementById('altCard');
                const altTag = document.getElementById('altTag');
                const statusSection = document.getElementById('statusSection');

                // קביעת צבעים לפי רמת העומס שה-AI החזיר
                if (result.is_crowded) {
                    statusTitle.className = "text-lg font-bold mb-1 text-red-500";
                    altCard.className = "bg-red-50 border border-red-200 text-red-900 rounded-xl p-4";
                    altTag.className = "text-sm text-red-600 font-bold";
                    altTag.innerText = "📍 מומלץ לשנות מסלול ליעד השקט הזה!";
                } else {
                    statusTitle.className = "text-lg font-bold mb-1 text-emerald-600";
                    altCard.className = "bg-emerald-50 border border-emerald-100 text-emerald-900 rounded-xl p-4";
                    altTag.className = "text-sm text-emerald-600 font-bold";
                    altTag.innerText = "📍 פנינה מקומית מומלצת באזור!";
                }

                // הצגת חלקים במסך על סמך הכפתור הספציפי שנלחץ
                if (type === 'check') {
                    statusSection.classList.remove('hidden');
                    altCard.classList.add('hidden'); // מחביא את החלופה בבדיקת עומס בלבד
                } else {
                    statusSection.classList.remove('hidden');
                    altCard.classList.remove('hidden'); // מציג גם את העומס וגם את החלופה
                }

                resultBox.classList.remove('hidden');
            } catch (err) {
                errorBox.innerText = 'משהו השתבש בניתוח הנתונים. נסה מקום אחר.';
                errorBox.classList.remove('hidden');
                console.error(err);
            } finally {
                // שחרור הכפתורים והחזרת הטקסט המקורי
                btnCheck.disabled = false;
                btnAlt.disabled = false;
                btnCheck.innerHTML = '<span>בדיקת עומס</span>';
                btnAlt.innerHTML = '<span>מצא לי חלופה</span>';
            }
        }
    </script>
</body>
</html>
