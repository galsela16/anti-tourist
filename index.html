<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Tourist | טיול בלי ההמונים</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center p-6">

    <header class="text-center mt-10 mb-10">
        <h1 class="text-4xl font-bold text-gray-800 mb-2">Anti<span class="text-emerald-600">-Tourist</span></h1>
        <p class="text-gray-600">גלה את הסודות המקומיים. תברח מההמונים בזמן אמת.</p>
    </header>

    <main class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">
        <div class="mb-6">
          <label class="block text-gray-700 text-sm font-bold mb-2">לאן כולם הולכים? (הכנס כל מקום בעולם)</label>
          <input id="search" type="text" placeholder="לדוגמה: מזרקת טרווי, אייפל, הכותל..." class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-emerald-500 transition text-right">
        </div>
        
        <button onclick="handleSearch()" id="btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-md flex justify-center items-center gap-2">
            <span>מצא לי חלופה שקטה</span>
        </button>

        <p id="errorBox" class="mt-4 text-sm text-red-500 font-bold text-center hidden"></p>

        <div id="resultBox" class="mt-8 border-t border-gray-100 pt-6 hidden">
            <p class="text-sm text-red-500 font-bold mb-1">⚠️ עמוס שם עכשיו!</p>
            <p class="text-gray-600 mb-4 text-sm">במקום להצטופף ב-<strong id="trapName"></strong>, מערכת ה-AI ממליצה על:</p>
            <div class="bg-emerald-50 border border-emerald-100 rounded-xl p-4">
                <h3 id="altName" class="font-bold text-emerald-800 text-lg mb-1"></h3>
                <p id="altDesc" class="text-sm text-emerald-700 mb-3 leading-relaxed"></p>
                <span class="text-sm text-blue-600 font-bold">📍 המקום מוכן לביקור חלופי!</span>
            </div>
        </div>
    </main>

    <script>
        async function handleSearch() {
            const query = document.getElementById('search').value.trim();
            const errorBox = document.getElementById('errorBox');
            const resultBox = document.getElementById('resultBox');
            const btn = document.getElementById('btn');
            
            if (!query) return;
            
            errorBox.classList.add('hidden');
            resultBox.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = '<span>ה-AI מחשב חלופה שקטה...</span>';

            try {
                // קריאה לפונקציית השרת המאובטחת שהרגע הקמנו ב-Supabase
                const response = await fetch('https://zvrvlogqjzpnojfzbapu.supabase.co/functions/v1/get-alternative', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': 'sb_publishable_PesppbHx38NnBgm1JH7EAw_ZMlLfAv1'
                    },
                    body: JSON.stringify({ query: query })
                });

                if (!response.ok) throw new Error('Network error');

                const result = await response.json();

                document.getElementById('trapName').innerText = result.tourist_trap;
                document.getElementById('altName').innerText = result.alternative_name;
                document.getElementById('altDesc').innerText = result.alternative_desc;
                resultBox.classList.remove('hidden');
            } catch (err) {
                errorBox.innerText = 'משהו השתבש בניתוח הנתונים. נסה מקום אחר או חפש באנגלית.';
                errorBox.classList.remove('hidden');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>מצא לי חלופה שקטה</span>';
            }
        }
    </script>
</body>
</html>
